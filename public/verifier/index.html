<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification de Traçabilité - ChainCacao</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/verificateur.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body class="verifier-site">
    <div class="container">
        <header>
            <div class="logo">C</div>
            <h1>Portail de Vérification Public</h1>
            <p>Entrez l'identifiant d'un lot pour consulter son historique complet sur la blockchain.</p>
        </header>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="lot-id-input" placeholder="Ex: LOT-1714570000000" autofocus>
                <button id="search-btn">VÉRIFIER MAINTENANT</button>
            </div>
            <div id="status-msg"></div>
        </div>

        <div id="result-container" class="hidden">
            <div class="result-header">
                <div class="lot-badge">IDENTIFIANT VALIDE</div>
                <h2 id="lot-id-display">--</h2>
            </div>
            
            <div id="trace-content">
                <!-- Rendu dynamique ici -->
            </div>
        </div>

        <footer>
            <img src="../images/icons/icon-192x192.png" alt="Logo" style="width:40px; border-radius:10px; margin-bottom:10px; opacity:0.5">
            <p>&copy; 2026 ChainCacao Network - Togo. Conformité EUDR Garantie.</p>
        </footer>
    </div>

    <script src="../js/database.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
